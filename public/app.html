<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Método OC - Diagnóstico</title>
    <style>
        body { background-color: #ecf0f1; font-family: sans-serif; padding: 10px; margin: 0; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 10px; width: 95%; max-width: 500px; margin: auto; border-top: 5px solid #2c3e50; text-align: center; }
        .logo-container { margin-bottom: 15px; }
        .logo-container img { max-width: 180px; height: auto; }
        h2 { color: #2c3e50; margin-top: 0; margin-bottom: 20px; font-size: 22px; text-align: center; }
        input, select, textarea { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; text-align: left; }
        button { width: 100%; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .btn-buscar { background-color: #2c3e50; color: white; }
        .btn-cerrar { background-color: #e74c3c; color: white; }
        #resultado { margin-top: 20px; padding: 15px; background: #e8f6f3; border-left: 5px solid #27ae60; display: none; white-space: pre-wrap; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="Omar Cuéllar - Electrónica Profesional">
    </div>

    <h2>Diagnóstico Método OC</h2>
    <select id="equipo"><option value="TV LCD">TV LCD</option><option value="TV TRC">TV TRC</option><option value="Audio">Audio</option><option value="Otros">Otros</option></select>
    <input type="text" id="marca" placeholder="Marca">
    <input type="text" id="modelo" placeholder="Modelo">
    <input type="text" id="sintoma" placeholder="Síntoma principal">
    <textarea id="mediciones" placeholder="Mediciones de voltajes y pruebas realizadas" rows="4"></textarea>
    
    <button class="btn-buscar" onclick="procesarConsulta()">Buscar solución</button>
    <button class="btn-cerrar" onclick="cerrarSesion()">Cerrar sesión</button>
    
    <div id="resultado"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCGPci2Tjb101nAaZUOh_3K_lpSmxfSDGw", 
        authDomain: "metodooc-alumnos.firebaseapp.com", 
        databaseURL: "https://metodooc-alumnos-default-rtdb.firebaseio.com", 
        projectId: "metodooc-alumnos" 
    };
    firebase.initializeApp(firebaseConfig);

    let usuarioActual = null;
    let primeraCarga = true;

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { 
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; 
        if(e.ctrlKey && (e.keyCode == 67 || e.keyCode == 88)) return false; 
    };
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('cut', e => e.preventDefault());

    firebase.auth().onAuthStateChanged((user) => { 
        if (!user) {
            window.location.href = "index.html"; 
        } else {
            usuarioActual = user;
            
            // Listener mejorado para evitar saltos en la carga inicial
            firebase.database().ref('usuarios/' + user.uid + '/sesion/token').on('value', (snapshot) => {
                const tokenServidor = snapshot.val();
                const tokenLocal = localStorage.getItem('sessionToken');
                
                if (primeraCarga) {
                    primeraCarga = false;
                    return; // Ignoramos el primer tiro porque es la sesión legítima que acaba de entrar
                }
                
                if (tokenServidor && tokenServidor !== tokenLocal) {
                    alert("Tu cuenta ha sido abierta en otro dispositivo. Se cerrará esta sesión.");
                    cerrarSesion();
                }
            });
        }
    });

    function cerrarSesion() { 
        localStorage.removeItem('sessionToken');
        firebase.auth().signOut().then(() => window.location.href = "index.html"); 
    }

    async function procesarConsulta() {
        if (!usuarioActual) return;
        
        const snapshot = await firebase.database().ref('usuarios/' + usuarioActual.uid + '/sesion/token').get();
        const tokenServidor = snapshot.val();
        const tokenLocal = localStorage.getItem('sessionToken');

        if (tokenServidor !== tokenLocal) {
            alert("Acceso denegado. Esta sesión ya no es válida.");
            cerrarSesion();
            return;
        }

        await buscarSolucion();
    }

    async function buscarSolucion() {
        const resDiv = document.getElementById('resultado');
        resDiv.style.display = 'block'; resDiv.innerText = "Consultando base de conocimientos...";
        try {
            const res = await fetch('/api/diagnostico', { 
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ equipo: document.getElementById('equipo').value, marca: document.getElementById('marca').value, modelo: document.getElementById('modelo').value, sintoma: document.getElementById('sintoma').value, mediciones: document.getElementById('mediciones').value })
            });
            const data = await res.json();
            resDiv.innerText = data.diagnostico || data.error;
        } catch (e) { resDiv.innerText = "Error de conexión. Intente más tarde."; }
    }
</script>
</body>
</html>

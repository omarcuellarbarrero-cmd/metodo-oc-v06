<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>App Método OC - Consulta Técnica</title>
    <style>
        body { background-color: #ecf0f1; font-family: sans-serif; }
        .header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 600px; margin: auto; }
        .opcion { background-color: #bdc3c7; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; color: #2c3e50; font-weight: bold; }
        .opcion:hover { background-color: #95a5a6; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-oc.png" alt="Logo" style="max-width: 120px; margin-bottom: 10px;">
        <h1>Diagnóstico Método OC</h1>
    </div>

    <div class="menu-grid">
        <div class="opcion" onclick="seleccionar('TV LCD')">TV LCD</div>
        <div class="opcion" onclick="seleccionar('TV TRC')">TV TRC</div>
        <div class="opcion" onclick="seleccionar('Audio')">Audio</div>
        <div class="opcion" onclick="seleccionar('Otros')">Otros</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <script>
        firebase.initializeApp({ 
            apiKey: "AIzaSyCGPci2Tjb101nAaZUOh_3K_lpSmxfSDGw", 
            authDomain: "metodooc-alumnos.firebaseapp.com", 
            projectId: "metodooc-alumnos" 
        });

        firebase.auth().onAuthStateChanged((user) => { if (!user) window.location.href = "index.html"; });

        async function seleccionar(tipo) {
            const marca = prompt("MARCA del equipo:");
            const modelo = prompt("MODELO:");
            const mediciones = prompt("Mediciones o pruebas realizadas:");
            const sintomas = prompt("Síntomas principales:");
            
            if (marca && modelo && mediciones && sintomas) {
                alert("Procesando consulta al Método OC...");
                try {
                    const res = await fetch('/api/diagnostico', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ equipo: tipo, marca, modelo, mediciones, sintomas })
                    });
                    const data = await res.json();
                    alert(data.diagnostico || data.error);
                } catch (e) { alert("Error de conexión."); }
            } else {
                alert("Debe completar todos los datos para un diagnóstico preciso.");
            }
        }
    </script>
</body>
</html>

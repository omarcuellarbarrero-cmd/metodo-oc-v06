<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>App Método OC</title>
    <style>
        body { background-color: #ecf0f1; font-family: sans-serif; }
        .header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 600px; margin: auto; }
        .opcion { background-color: #bdc3c7; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; color: #2c3e50; font-weight: bold; }
        .opcion:hover { background-color: #95a5a6; }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo-oc.png" alt="Logo" style="max-width: 120px; margin-bottom: 10px;">
        <h1>Seleccione su equipo</h1>
    </div>
    <div class="menu-grid">
        <div class="opcion" onclick="seleccionar('TV LCD')">TV LCD</div>
        <div class="opcion" onclick="seleccionar('TV TRC')">TV TRC</div>
        <div class="opcion" onclick="seleccionar('Audio')">Audio</div>
        <div class="opcion" onclick="seleccionar('Otros')">Otros</div>
    </div>
<script>
    const auth = firebase.auth();
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = "app.html";
        }
    });
</script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script>
        firebase.initializeApp({ apiKey: "SU_API_KEY", authDomain: "SU_PROYECTO.firebaseapp.com", projectId: "SU_PROYECTO" });
        firebase.auth().onAuthStateChanged((user) => { if (!user) window.location.href = "index.html"; });
        async function seleccionar(equipo) {
            const sintomas = prompt(`Describa los síntomas para ${equipo}:`);
            if (sintomas) {
                const res = await fetch('/api/diagnostico', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ equipo, sintomas })});
                const data = await res.json();
                alert(data.diagnostico || data.error);
            }
        }
    </script>
</body>
</html>

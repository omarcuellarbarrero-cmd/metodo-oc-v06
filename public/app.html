<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>App Método OC - Diagnóstico</title>
    <style>
        body { background-color: #ecf0f1; font-family: sans-serif; padding: 20px; }
        .container { background-color: #ffffff; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; border-top: 5px solid #2c3e50; }
        input, select, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background-color: #2c3e50; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #resultado { margin-top: 20px; padding: 15px; background: #e8f6f3; border-left: 5px solid #27ae60; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema de Diagnóstico OC</h2>
    <select id="equipo">
        <option value="TV LCD">TV LCD</option>
        <option value="TV TRC">TV TRC</option>
        <option value="Audio">Audio</option>
        <option value="Otros">Otros</option>
    </select>
    <input type="text" id="marca" placeholder="Marca">
    <input type="text" id="modelo" placeholder="Modelo">
    <input type="text" id="sintoma" placeholder="Síntoma principal">
    <textarea id="mediciones" placeholder="Mediciones de voltajes y pruebas realizadas" rows="4"></textarea>
    
    <button onclick="buscarSolucion()">Buscar solución</button>
    <div id="resultado"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
<script>
    firebase.initializeApp({ apiKey: "AIzaSyCGPci2Tjb101nAaZUOh_3K_lpSmxfSDGw", authDomain: "metodooc-alumnos.firebaseapp.com", projectId: "metodooc-alumnos" });
    firebase.auth().onAuthStateChanged((user) => { if (!user) window.location.href = "index.html"; });

    async function buscarSolucion() {
        const datos = {
            equipo: document.getElementById('equipo').value,
            marca: document.getElementById('marca').value,
            modelo: document.getElementById('modelo').value,
            sintoma: document.getElementById('sintoma').value,
            mediciones: document.getElementById('mediciones').value
        };

        const resDiv = document.getElementById('resultado');
        resDiv.style.display = 'block';
        resDiv.innerText = "Consultando base de conocimientos Método OC...";

        const res = await fetch('/api/diagnostico', { 
            method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos)
        });
        const data = await res.json();
        resDiv.innerText = data.diagnostico || data.error;
    }
</script>
</body>
</html>

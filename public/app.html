<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Método OC - Diagnóstico</title>
    <style>
        body { 
            background-color: #ecf0f1; 
            font-family: sans-serif; 
            padding: 10px; 
            margin: 0; 
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }
        .container { background-color: #ffffff; padding: 20px; border-radius: 10px; width: 95%; max-width: 500px; margin: auto; border-top: 5px solid #2c3e50; }
        input, select, textarea { width: 100%; margin-bottom: 15px; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .btn-buscar { background-color: #2c3e50; color: white; }
        .btn-cerrar { background-color: #e74c3c; color: white; }
        #resultado { margin-top: 20px; padding: 15px; background: #e8f6f3; border-left: 5px solid #27ae60; display: none; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Diagnóstico Método OC</h2>
    <select id="equipo"><option value="TV LCD">TV LCD</option><option value="TV TRC">TV TRC</option><option value="Audio">Audio</option><option value="Otros">Otros</option></select>
    <input type="text" id="marca" placeholder="Marca">
    <input type="text" id="modelo" placeholder="Modelo">
    <input type="text" id="sintoma" placeholder="Síntoma principal">
    <textarea id="mediciones" placeholder="Mediciones de voltajes y pruebas realizadas" rows="4"></textarea>
    
    <button class="btn-buscar" onclick="buscarSolucion()">Buscar solución</button>
    <button class="btn-cerrar" onclick="cerrarSesion()">Cerrar sesión</button>
    
    <div id="resultado"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
<script>
    firebase.initializeApp({ apiKey: "AIzaSyCGPci2Tjb101nAaZUOh_3K_lpSmxfSDGw", authDomain: "metodooc-alumnos.firebaseapp.com", projectId: "metodooc-alumnos" });
    firebase.auth().onAuthStateChanged((user) => { if (!user) window.location.href = "index.html"; });

    // Protección Total: Clic derecho, F12, Selección, Copiado y Cortado
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { 
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; 
        if(e.ctrlKey && (e.keyCode == 67 || e.keyCode == 88)) return false; 
    };
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('copy', e => e.preventDefault());
    document.addEventListener('cut', e => e.preventDefault());

    function cerrarSesion() { firebase.auth().signOut().then(() => window.location.href = "index.html"); }

    async function buscarSolucion() {
        const resDiv = document.getElementById('resultado');
        resDiv.style.display = 'block'; resDiv.innerText = "Consultando base de conocimientos...";
        try {
            const res = await fetch('/api/diagnostico', { 
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ equipo: document.getElementById('equipo').value, marca: document.getElementById('marca').value, modelo: document.getElementById('modelo').value, sintoma: document.getElementById('sintoma').value, mediciones: document.getElementById('mediciones').value })
            });
            const data = await res.json();
            resDiv.innerText = data.diagnostico || data.error;
        } catch (e) { resDiv.innerText = "Error de conexión. Intente más tarde."; }
    }
</script>
</body>
</html>

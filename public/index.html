<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Método OC</title>
    <style>
        body { background-color: #2c3e50; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h1 { color: #2c3e50; font-size: 24px; }
        button { background-color: #4285f4; color: white; border: none; padding: 15px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 20px; }
        button:hover { background-color: #357ae8; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo-oc.png" alt="Logo" style="max-width: 150px;">
    <h1>Ingreso Método OC</h1>
    <p>Inicie sesión con su cuenta autorizada para acceder al sistema de diagnóstico.</p>
    <button onclick="iniciarSesion()">Ingresar con Google</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
<script>
    firebase.initializeApp({ apiKey: "AIzaSyCGPci2Tjb101nAaZUOh_3K_lpSmxfSDGw", authDomain: "metodooc-alumnos.firebaseapp.com", projectId: "metodooc-alumnos" });
    
    // Protección: Clic derecho y F12
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false; };

    function iniciarSesion() {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider).then(() => {
            window.location.href = "app.html";
        }).catch(err => alert("Error al ingresar: " + err.message));
    }

    // Redirección automática si ya está logueado
    firebase.auth().onAuthStateChanged((user) => {
        if (user) window.location.href = "app.html";
    });
</script>
</body>
</html>
